project: bmi_demo
trait: bmi

input:
  sumstats: sumstats.tsv
  genome_build: GRCh37
  ancestry: EAS

columns:
  snp: SNP
  p: P
  n: N
  chr: CHR
  bp: BP
  a1: A1
  a2: A2

sample_size:
  mode: column
  value: N

resources:
  magma_bin: auto
  reference_panel: auto
  gene_locations: auto
  gene_annotation: auto
  feature_bundle: default_full_v1

analysis:
  prioritization:
    mode: lead_snp_window
    window_bp: 500000

output:
  outdir: results/bmi_demo
