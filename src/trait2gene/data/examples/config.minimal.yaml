project: bmi_demo
trait: bmi

input:
  sumstats: sumstats.example.tsv
  genome_build: GRCh37
  ancestry: EAS

columns:
  snp: SNP
  p: P
  n: N
  chr: CHR
  bp: BP
  a1: A1
  a2: A2

sample_size:
  mode: column
  value: N

resources:
  magma_bin: auto
  reference_panel: auto
  gene_locations: auto
  gene_annotation: auto
  feature_bundle: default_full_v1

analysis:
  magma:
    model: snp-wise=mean
  pops:
    method: ridge
    use_magma_covariates: true
    use_magma_error_cov: true
    remove_hla: true
  prioritization:
    mode: lead_snp_window
    window_bp: 500000

output:
  outdir: results/bmi_demo
  write_html_report: true
  write_json_summary: true
